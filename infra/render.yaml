# Render manifest (example) — configure service IDs and secrets in Render dashboard
services:
  - type: web
    name: imob-backend
    env: python
    plan: free
    repo: .
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        from: env
      - key: SECRET_KEY
        from: env

  - type: cron
    name: imob-scrapers
    env: python
    plan: free
    repo: .
    branch: main
    # run the due operational schedules; offsets, jitter and locking live in code/settings
    schedule: "*/10 * * * *"
    buildCommand: pip install -r backend/requirements.txt && pip install -r scrapers/requirements.txt
    startCommand: python -m scrapers.scheduler --run-due-once
    envVars:
      - key: DATABASE_URL
        from: env
      - key: SECRET_KEY
        from: env

# Note: fill in env vars and secrets via the Render dashboard. This manifest is a template
# Render will use it if you connect the repository and enable "Auto-Deploy".
