name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend quick checks
        run: |
          echo "Run your backend tests or linters here"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build --if-present

      - name: Build Docker images (optional)
        run: |
          docker build -t imob-backend -f backend/Dockerfile . || true
          docker build -t imob-scrapers -f scrapers/Dockerfile . || true

      - name: Upload artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: |
            frontend/.next || true
            backend/requirements.txt
